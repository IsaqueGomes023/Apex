<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com">
  function copyIgMsg(e) {
    e.preventDefault();
    const msg = "Oi, Jorge! Vi seu cartão de visita digital e me interessei pelas soluções da Apex Supply para a indústria. Podemos conversar? 😊";
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(msg).then(function() {
        showIgToast();
        setTimeout(() => window.open('https://www.instagram.com/apexsupplybr/', '_blank'), 600);
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = msg;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showIgToast();
      setTimeout(() => window.open('https://www.instagram.com/apexsupplybr/', '_blank'), 600);
    }
  }
  function showIgToast() {
    const t = document.createElement('div');
    t.textContent = '✅ Mensagem copiada! Cole no Direct do Instagram.';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3a1a4a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.4)';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

</script>

<style>
  /* ============================================================
     APEX SUPPLY — vCard Digital Interativo
     Titular: Jorge Kogake Júnior | Comercial
     Versão:  1.0 | Junho 2025
     Uso:     Deploy direto como index.html ou link compartilhado
  ============================================================ */

  /* --- Variáveis de marca ----------------------------------- */
  :root {
    --navy:       #0B1F3A;
    --navy-deep:  #071428;
    --gold:       #F5A000;
    --gold-dark:  #D07800;
    --gold-light: #FFB833;
    --green-wa:   #25D366;
  }

  * { box-sizing: border-box; }

  /* --- Background global ------------------------------------ */
  body {
    margin: 0;
    padding: 20px 16px 48px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background:
      radial-gradient(ellipse 80% 55% at 15% 90%, rgba(245,160,0,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 88% 12%, rgba(30,85,210,0.12) 0%, transparent 50%),
      linear-gradient(145deg, #071428 0%, #0B1F3A 55%, #0D2550 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, sans-serif;
  }

  /* --- Card principal --------------------------------------- */
  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(11,31,58,0.88);
    border: 1px solid rgba(245,160,0,0.16);
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 28px 65px rgba(0,0,0,0.65),
      0 0 0 1px rgba(245,160,0,0.07),
      inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  /* Linha de topo dourada */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 18%; right: 18%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 1px;
    z-index: 1;
  }

  /* --- Seção hero ------------------------------------------ */
  .hero {
    padding: 36px 28px 22px;
    text-align: center;
    background: linear-gradient(180deg, rgba(245,160,0,0.055) 0%, transparent 100%);
  }

  /* Logo */
  .logo-wrap {
    width: 92px;
    height: 92px;
    margin: 0 auto 18px;
    filter: drop-shadow(0 4px 22px rgba(245,160,0,0.38));
    animation: slideDown 0.55s cubic-bezier(.22,.68,0,1.2) both;
  }

  /* Nome */
  .name {
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.025em;
    margin: 0 0 10px;
    animation: slideUp 0.5s 0.1s ease both;
  }

  /* Badge de cargo */
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #FFFFFF;
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 18px;
    border-radius: 100px;
    margin-bottom: 8px;
    animation: slideUp 0.5s 0.18s ease both;
  }

  /* Empresa */
  .company {
    color: rgba(255,255,255,0.38);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin: 0;
    animation: slideUp 0.5s 0.24s ease both;
  }

  /* Divider dourado */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,160,0,0.38), transparent);
    margin: 18px 28px;
    animation: fadeIn 0.6s 0.3s ease both;
  }

  /* --- Tagline + especialidades ---------------------------- */
  .tagline {
    padding: 0 28px 14px;
    text-align: center;
    animation: slideUp 0.5s 0.33s ease both;
  }

  .tagline p {
    color: rgba(255,255,255,0.46);
    font-size: 12px;
    line-height: 1.65;
    margin: 0 0 12px;
  }

  .tagline strong { color: var(--gold); font-weight: 600; }

  /* Pills de especialidade */
  .pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .pill {
    background: rgba(245,160,0,0.09);
    border: 1px solid rgba(245,160,0,0.22);
    color: rgba(245,160,0,0.88);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 4px 13px;
    border-radius: 100px;
    text-transform: uppercase;
  }

  /* --- Botões de ação -------------------------------------- */
  .actions {
    padding: 14px 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Base de botão */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    width: 100%;
    padding: 15px 18px;
    border-radius: 16px;
    font-size: 13.5px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.012em;
    font-family: inherit;
    color: rgba(255,255,255,0.84);
    transition:
      transform  0.22s cubic-bezier(.4,0,.2,1),
      box-shadow 0.22s cubic-bezier(.4,0,.2,1),
      filter     0.22s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active  { transform: scale(0.965); }
  .btn:hover   { transform: translateY(-2px); }

  /* WhatsApp — CTA primário */
  .btn-wa {
    background: linear-gradient(135deg, var(--green-wa), #128C5B);
    color: white;
    box-shadow: 0 4px 22px rgba(37,211,102,0.38);
    animation: slideUp 0.5s 0.38s ease both, pulse-wa 3s 1.4s ease-in-out infinite;
  }
  .btn-wa:hover { box-shadow: 0 8px 30px rgba(37,211,102,0.52); filter: brightness(1.06); }

  /* Vidro escuro para os demais */
  .btn-glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .btn-glass:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(245,160,0,0.28);
    box-shadow: 0 6px 22px rgba(0,0,0,0.22);
  }

  /* Linha social (LinkedIn + Instagram) */
  .social-row { display: flex; gap: 10px; }
  .social-row .btn { flex: 1; padding: 13px 10px; font-size: 13px; }

  /* Salvar contato — CTA dourado */
  .btn-save {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #071428;
    font-weight: 800;
    box-shadow: 0 4px 22px rgba(245,160,0,0.38);
    animation: slideUp 0.5s 0.58s ease both;
    position: relative; overflow: hidden;
  }
  .btn-save::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    pointer-events: none;
  }
  .btn-save:hover { box-shadow: 0 8px 32px rgba(245,160,0,0.5); filter: brightness(1.06); }
  .btn-save.saved {
    background: linear-gradient(135deg, var(--green-wa), #1DA851);
    color: white;
    box-shadow: 0 4px 22px rgba(37,211,102,0.38);
  }

  /* Delays para animação sequencial */
  .b-em   { animation: slideUp 0.5s 0.43s ease both; }
  .b-site { animation: slideUp 0.5s 0.48s ease both; }
  .b-soc  { animation: slideUp 0.5s 0.53s ease both; }

  /* --- Footer ---------------------------------------------- */
  .footer {
    padding: 0 22px 20px;
    text-align: center;
    animation: fadeIn 0.6s 0.65s ease both;
  }
  .footer-div {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    margin-bottom: 12px;
  }
  .footer p {
    color: rgba(255,255,255,0.2);
    font-size: 10.5px;
    margin: 0;
    letter-spacing: 0.05em;
  }

  /* --- Keyframes ------------------------------------------- */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-wa {
    0%,100% { box-shadow: 0 4px 22px rgba(37,211,102,0.38); }
    50%      { box-shadow: 0 4px 30px rgba(37,211,102,0.65), 0 0 0 7px rgba(37,211,102,0.09); }
  }
</style>

  <script>
    /* ═══════════════════════════════════════════════════════
       SALVAR CONTATO — Geração de vCard 3.0 (.vcf)
       Compatível com: iOS Contatos, Android, Outlook
    ═══════════════════════════════════════════════════════ */
    function salvarContato(evt) {
      evt.preventDefault();

      /* Dados do contato */
      const vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Jorge Kogake Júnior',
        'N:Kogake Júnior;Jorge;;;',
        'ORG:Apex Supply',
        'TITLE:Comercial',
        'TEL;TYPE=CELL,PREF:+5521966484665',
        'TEL;TYPE=WORK:+5521966484665',
        'EMAIL;TYPE=WORK,PREF:jorge.kogake@apexsupply.com.br',
        'URL:https://apexsupply.com.br',
        'X-SOCIALPROFILE;TYPE=instagram:https://www.instagram.com/apexsupplybr/',
        'X-SOCIALPROFILE;TYPE=linkedin:https://linkedin.com/company/apexsupply',
        'NOTE:Tecnologia e Soluções para a Indústria Onshore e Offshore.' +
          ' Especialidades: Automação Industrial · Bombas Elétricas e Pneumáticas.',
        'END:VCARD'
      ].join('\r\n');

      /* Gerar e acionar download */
      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'Jorge_Kogake_ApexSupply.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      /* Feedback visual — estado "Salvo" */
      const btn   = document.getElementById('saveBtn');
      const icon  = document.getElementById('saveIcon');
      const label = document.getElementById('saveLabel');

      btn.classList.add('saved');
      icon.innerHTML =
        '<polyline points="20 6 9 17 4 12"' +
        ' stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
      label.textContent = 'Contato Salvo!';

      /* Restaurar após 3 s */
      setTimeout(() => {
        btn.classList.remove('saved');
        icon.innerHTML =
          '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"' +
          ' stroke="currentColor" stroke-width="2.5" fill="none"/>' +
          '<polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="2.5" fill="none"/>' +
          '<polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="2.5" fill="none"/>';
        label.textContent = 'Salvar Contato';
      }, 3000);
    }
  </script>
